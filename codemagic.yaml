workflows:
  ZikAfrica iOS TestFlight:
    name: ZikAfrica iOS TestFlight
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CodemagicAdmin

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zikafrica.ZikAfrica

    scripts:
      - name: Créer ou récupérer le certificat et le profil
        script: |
          app-store-connect fetch-signing-files com.zikafrica.ZikAfrica \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates

      - name: Build IPA
        script: |
          xcode-project use-profiles

          xcodebuild archive \
            -project ZikAfrica.xcodeproj \
            -scheme ZikAfrica \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/xcarchive/ZikAfrica.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=8H443Z4286 \
            COMPILER_INDEX_STORE_ENABLE=NO

          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/ZikAfrica.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
