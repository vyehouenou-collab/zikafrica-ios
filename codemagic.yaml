workflows:
  zikafrica-ios-workflow:
    name: ZikAfrica iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: CodemagicAdmin

    environment:
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - zikafricaappstore
        certificates:
          - zikafrica_distribution

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ZikAfrica.xcodeproj \
            --scheme ZikAfrica

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
