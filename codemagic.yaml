workflows:
  zikafrica-ios-workflow:
    name: ZikAfrica iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: CodemagicAdmin

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zikafrica.ZikAfrica

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.zikafrica.ZikAfrica --type IOS_APP_STORE --create --verbose
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ZikAfrica.xcodeproj \
            --scheme ZikAfrica

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
