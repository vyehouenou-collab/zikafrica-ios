workflows:
  zikafrica-ios-workflow:
    name: ZikAfrica iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: CodemagicAdmin

    environment:
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - zikafricaappstore
        certificates:
          - zikafrica_distribution

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          set -o pipefail
          xcodebuild archive \
            -project ZikAfrica.xcodeproj \
            -scheme ZikAfrica \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ZikAfrica.xcarchive \
            DEVELOPMENT_TEAM=8H443Z4286 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="ZikAfrica App Store" \
            COMPILER_INDEX_STORE_ENABLE=NO | tee xcodebuild.log

    artifacts:
      - build/ios/ipa/*.ipa
      - xcodebuild.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
