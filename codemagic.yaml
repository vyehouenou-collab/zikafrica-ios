workflows:
  ZikAfrica iOS TestFlight:
    name: ZikAfrica iOS TestFlight
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: ZikAfrica_AppStore

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zikafrica.ZikAfrica

    scripts:
      - name: Build IPA
        script: |
          # Appliquer les profils récupérés automatiquement par Codemagic
          xcode-project use-profiles

          # Archiver l'app
          xcodebuild archive \
            -project ZikAfrica.xcodeproj \
            -scheme ZikAfrica \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/xcarchive/ZikAfrica.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=8H443Z4286 \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Exporter l'IPA
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/ZikAfrica.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
