workflows:
  ZikAfrica iOS TestFlight:
    name: ZikAfrica iOS TestFlight
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: CodemagicAdmin

    environment:
      vars:
        BUNDLE_ID: "com.zikafrica.ZikAfrica"
        DEVELOPMENT_TEAM: "8H443Z4286"

    scripts:
      - name: Créer ou récupérer le certificat et le profil
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates

      - name: Appliquer les profils Xcode
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ZikAfrica.xcodeproj \
            --scheme ZikAfrica

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
